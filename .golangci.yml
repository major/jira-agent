version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocognit
    - gocritic
    - gosec
    - misspell
    - modernize
    - nolintlint
    - revive
    - unconvert
    - unparam

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    gocognit:
      min-complexity: 30

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

    revive:
      rules:
        - name: indent-error-flow
        - name: unexported-return
          disabled: true

  exclusions:
    generated: strict
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - gocognit
          - goconst
          - gosec
          - unparam

run:
  timeout: 5m
